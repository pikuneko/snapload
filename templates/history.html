<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='saitoico.png') }}">
    <link rel="apple-touch-icon-precomposed"
        href="{{ url_for('static', filename='apple-touch-icon-precomposed.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>ダウンロード履歴</title>
</head>

<body>
    <div class="container">
        <h1 data-aos="fade-down">
            <a href="{{ url_for('index') }}" class="logo-link">
                <img src="{{ url_for('static', filename='saitoico.png') }}" alt="SnapLoad Icon" />SnapLoad
            </a>
        </h1>

        <div class="search-container" data-aos="fade-up" data-aos-delay="50">
            <div class="search-wrapper">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="history-search" placeholder="タイトルで履歴を検索..." oninput="searchHistory()">
            </div>
        </div>

        {% if history %}
        <div class="history-container" id="history-items">
            {% for item in history %}
            <div class="history-item" data-aos="fade-up" data-aos-delay="{{ loop.index0 * 50 }}"
                data-title="{{ item.title|lower }}">
                <div class="history-info">
                    <div class="history-title">
                        <span class="history-type type-{{ item.file_type }}">{{ item.file_type|upper }}</span>
                        {{ item.title }}
                    </div>
                    <div class="history-meta">
                        {% if item.is_playlist %}
                        <i class="fas fa-list"></i> プレイリスト {% endif %}
                        <i class="fas fa-calendar"></i> {{ item.download_date }}
                    </div>
                </div>
                <div class="history-actions">
                    <a href="{{ url_for('download', name=item.file_path) }}" class="history-btn download-btn">
                        <i class="fas fa-download"></i>
                    </a>
                    <a href="{{ item.url }}" target="_blank" class="history-btn youtube-btn">
                        <i class="fab fa-youtube"></i>
                    </a>
                    <button onclick="deleteHistory('{{ item.file_path }}', this)" class="history-btn delete-btn"
                        title="履歴から削除">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </div>
            {% endfor %}
        </div>

        <!-- ページネーション（将来的に実装する場合） -->
        <!--
            <div class="pagination">
                <a href="#" class="page-btn">前へ</a>
                <a href="#" class="page-btn active">1</a>
                <a href="#" class="page-btn">2</a>
                <a href="#" class="page-btn">3</a>
                <a href="#" class="page-btn">次へ</a>
            </div>
            -->
        {% else %}
        <div class="no-history" data-aos="zoom-in">
            <i class="fas fa-history fa-3x"></i>
            <p>ダウンロード履歴はありません</p>
        </div>
        {% endif %}

        <div class="footer-actions">
            <a href="{{ url_for('index') }}" class="back-link">← トップページに戻る</a>
        </div>
    </div>
    <script>
        function searchHistory() {
            const query = document.getElementById('history-search').value.toLowerCase();
            const items = document.querySelectorAll('.history-item');

            items.forEach(item => {
                const title = item.getAttribute('data-title');
                if (title.includes(query)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        async function deleteHistory(filePath, btn) {
            const result = await Swal.fire({
                title: '履歴を削除しますか？',
                text: "この操作は元に戻せません。",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#eb3349',
                cancelButtonColor: '#64748b',
                confirmButtonText: '削除する',
                cancelButtonText: 'キャンセル'
            });

            if (result.isConfirmed) {
                try {
                    const response = await fetch('/api/history/delete', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ file_path: filePath })
                    });

                    const data = await response.json();
                    if (data.redirect) {
                        window.location.href = data.redirect;
                        return;
                    }
                    if (data.success) {
                        const item = btn.closest('.history-item');
                        item.classList.add('fade-out');
                        setTimeout(() => item.remove(), 400);

                        Swal.fire({
                            title: '削除完了',
                            icon: 'success',
                            timer: 1500,
                            showConfirmButton: false
                        });
                    } else {
                        Swal.fire('エラー', data.error || '削除に失敗しました', 'error');
                    }
                } catch (err) {
                    Swal.fire('エラー', '通信に失敗しました', 'error');
                }
            }
        }
    </script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>

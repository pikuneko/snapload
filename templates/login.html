<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - SnapLoad</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="container login-container">
        <div class="login-card">
            <h2><i class="fas fa-lock"></i> SnapLoad</h2>
            <p style="color: var(--text-muted); margin-bottom: 20px;">パスコードを入力してください</p>

            <form method="POST">
                <input type="hidden" name="next" value="{{ next }}">
                <input type="password" name="passcode" class="login-input" placeholder="****" autofocus required>
                <button type="submit" class="login-btn">
                    アクセスを許可
                </button>
            </form>

            {% if error %}
            <div class="error-msg">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}
        </div>
    </div>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>

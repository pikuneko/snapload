<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='saitoico.png') }}">
    <link rel="apple-touch-icon-precomposed"
        href="{{ url_for('static', filename='apple-touch-icon-precomposed.png') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>アップデート履歴 - SnapLoad</title>
</head>

<body>
    <div class="container updates-container">
        <h1 data-aos="fade-down">
            <a href="{{ url_for('index') }}" class="logo-link">
                <img src="{{ url_for('static', filename='saitoico.png') }}" alt="SnapLoad Icon" />SnapLoad
            </a>
        </h1>

        <div class="updates-timeline">
            {% for item in updates %}
            <div class="update-card {{ item.badge or '' }}" data-aos="fade-up" data-aos-delay="{{ loop.index0 * 100 }}">
                <div class="update-header">
                    <span class="version-tag">{% if item.version == "LATEST" %}{{ app_version }}{% else %}{{
                        item.version }}{% endif %}</span>
                    <span class="update-date">{{ item.date }}</span>
                </div>
                <div class="update-content">
                    <h3>{{ item.title }}</h3>
                    <ul>
                        {% for change in item.changes %}
                        <li><i class="fas fa-check"></i> {{ change|safe }}</li>
                        {% endfor %}
                    </ul>
                </div>
            </div>
            {% endfor %}
        </div>

        <div class="footer-actions" data-aos="fade-up" data-aos-delay="300">
            <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i> トップページに戻る</a>
        </div>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>

</html>
